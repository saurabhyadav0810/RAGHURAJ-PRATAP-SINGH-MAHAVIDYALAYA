<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raghuraj Pratap Singh Mahavidyalaya</title>
    <link rel="icon" href="logo.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>

    <!-- Header Section -->
    <header>
        <div class="container header-content">
            <div class="logo-area">
                <img src="logo.png" alt="College Logo" class="logo">
                <div class="college-name">
                    <h1>RAGHURAJ PRATAP SINGH MAHAVIDYALAYA</h1>
                    <!-- <h2>MAHAVIDYALAYA</h2> -->
                </div>
            </div>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html#home">Home</a></li>
                    <li><a href="index.html#about">About Us</a></li>
                    <li><a href="index.html#courses">Courses</a></li>
                    <li><a href="placement.html" class="active">Placement</a></li>
                    <li><a href="index.html#contact">Contact Us</a></li>
                </ul>
                <div class="burger">
                    <div class="line1"></div>
                    <div class="line2"></div>
                    <div class="line3"></div>
                </div>
            </nav>
        </div>
    </header>

    <!-- Placement Section -->
    <section class="section-padding bg-light">
        <div class="container">
            <div class="section-header">
                <h2>Placement Form</h2>
                <div class="line"></div>
                <p style="margin-top: 15px;">Register your details for placement opportunities.</p>
            </div>
            
            <div class="form-container">
                <form class="placement-form">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" placeholder="Enter your full name" required>
                    </div>

                    <div class="form-group">
                        <label for="qualification">Highest Qualification</label>
                        <select id="qualification" required>
                            <option value="">Select Qualification</option>
                            <option value="High School">High School</option>
                            <option value="Intermediate">Intermediate</option>
                            <option value="Graduation">Graduation</option>
                            <option value="Post Graduation">Post Graduation</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div class="form-grid">
                        <div class="form-group">
                            <label for="contact">Contact Number</label>
                            <input type="tel" id="contact" placeholder="10-digit mobile number" required>
                        </div>
                        <div class="form-group">
                            <label for="email">E-mail ID</label>
                            <input type="email" id="email" placeholder="example@email.com" required>
                        </div>
                    </div>

                    <div class="form-grid">
                        <div class="form-group">
                            <label for="father">Father's Name</label>
                            <input type="text" id="father" placeholder="Father's full name" required>
                        </div>
                        <div class="form-group">
                            <label for="mother">Mother's Name</label>
                            <input type="text" id="mother" placeholder="Mother's full name" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="dob">Date of Birth</label>
                        <input type="date" id="dob" required>
                    </div>

                    <div class="form-group">
                        <label for="address">Address</label>
                        <textarea id="address" rows="3" placeholder="Enter full address" required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="resume">Upload Resume</label>
                        <input type="file" id="resume" accept=".pdf,.doc,.docx">
                        <small>Supported formats: PDF, DOC, DOCX</small>
                    </div>

                    <button type="submit" class="btn btn-white" style="width: 100%; margin-top: 10px;">Submit Application</button>
                </form>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p>&copy; 2026 Raghuraj Pratap Singh Mahavidyalaya. All Rights Reserved.</p>
            <div class="social-links">
                <a href="https://www.facebook.com/share/16kkAtsJha/"><i class="fab fa-facebook-f"></i></a>
                <!-- <a href="#"><i class="fab fa-twitter"></i></a> -->
                <a href="https://www.instagram.com/rpsgoi.balkishunnagar?igsh=MTRqcnkwMTlxeG50cw%3D%3D"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
